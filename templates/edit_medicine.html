{% extends "base.html" %}

{% block content %}

<h2>Edit Medicine</h2>

<form method="POST">

<div class="mb-3">
<label>Medicine Name</label>

<input 
type="text"
class="form-control"
name="medicine_name"
value="{{ medicine.medicine_name }}"
required>

</div>


<div class="mb-3">
<label>Company</label>

<input 
type="text"
class="form-control"
name="company"
value="{{ medicine.company }}"
required>

</div>


<div class="mb-3">
<label>Price</label>

<input 
type="number"
step="0.01"
class="form-control"
name="price"
value="{{ medicine.price }}"
required>

</div>


<div class="mb-3">
<label>Quantity</label>

<input 
type="number"
class="form-control"
name="quantity"
value="{{ medicine.quantity }}"
required>

</div>


<div class="mb-3">
<label>Threshold Quantity</label>

<input 
type="number"
class="form-control"
name="threshold_quantity"
value="{{ medicine.threshold_quantity }}"
required>

</div>


<div class="mb-3">
<label>Expiry Date</label>

<input 
type="date"
class="form-control"
name="expiry_date"
value="{{ medicine.expiry_date }}"
required>

</div>


<button class="btn btn-success">
Update Medicine
</button>


<a href="/" class="btn btn-secondary">
Cancel
</a>


</form>

{% endblock %}
